# Vivendi Deuteranopia — Starship Theme
# Based on the modus-vivendi-deuteranopia palette by Protesilaos Stavrou
# https://protesilaos.com/emacs/modus-themes-colors
#
# This dark theme is optimised for red-green colour deficiency (deuteranopia /
# deuteranomaly).  Colour-coding relies exclusively on yellows, blues, and
# cyans — no red/green distinctions are used for semantic meaning.
#
# Palette reference (resolved hex values from the official colour page):
#   bg-main              #000000   fg-main          #ffffff
#   bg-dim               #1e1e1e   fg-dim           #989898
#   bg-active            #535353   fg-alt           #c6daff
#   border               #646464
#   blue                 #2fafff   blue-warmer      #79a8ff
#   blue-cooler          #00bcff   blue-faint       #82b0ec
#   blue-intense         #338fff
#   yellow               #cabf00   yellow-warmer    #ffa00f
#   yellow-cooler        #d8af7a   yellow-faint     #d2b580
#   yellow-intense       #efef00
#   cyan                 #00d3d0   cyan-warmer      #4ae2f0
#   cyan-cooler          #6ae4b9   cyan-faint       #9ac8e0
#   magenta              #feacd0   magenta-warmer   #f78fe7
#   magenta-cooler       #b6a0ff   magenta-faint    #caa6df
#   green                #44bc44   green-cooler     #00c06f
#   red                  #ff5f59   (used sparingly — errors only)
#   bg-mode-line-active  #2a2a6a   fg-mode-line-active #f0f0f0
#   modeline-err         #e5bf00   modeline-warning #c0cf35
#   modeline-info        #abeadf
#   err (semantic)       yellow-warmer → #ffa00f
#   warning (semantic)   yellow       → #cabf00
#   info (semantic)      blue        → #2fafff

# ── Format ────────────────────────────────────────────────────────────────────

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$cmd_duration\
$jobs\
$battery\
$time\
$line_break\
$character"""

right_format = ""

# ── Palette ───────────────────────────────────────────────────────────────────

palette = "modus_vivendi_deuteranopia"

[palettes.modus_vivendi_deuteranopia]
# Backgrounds
bg_main       = "#000000"
bg_dim        = "#1e1e1e"
bg_active     = "#535353"
bg_inactive   = "#303030"
bg_modeline   = "#2a2a6a"

# Foregrounds
fg_main       = "#ffffff"
fg_dim        = "#989898"
fg_alt        = "#c6daff"
fg_modeline   = "#f0f0f0"
border        = "#646464"

# Blues
blue          = "#2fafff"
blue_warmer   = "#79a8ff"
blue_cooler   = "#00bcff"
blue_faint    = "#82b0ec"
blue_intense  = "#338fff"

# Yellows
yellow        = "#cabf00"
yellow_warmer = "#ffa00f"
yellow_cooler = "#d8af7a"
yellow_faint  = "#d2b580"
yellow_intense= "#efef00"

# Cyans
cyan          = "#00d3d0"
cyan_warmer   = "#4ae2f0"
cyan_cooler   = "#6ae4b9"
cyan_faint    = "#9ac8e0"

# Magentas (accent, not for semantic coding in deuteranopia)
magenta       = "#feacd0"
magenta_warmer= "#f78fe7"
magenta_cooler= "#b6a0ff"
magenta_faint = "#caa6df"

# Greens (low-salience accents)
green         = "#44bc44"
green_cooler  = "#00c06f"

# Red — reserved for genuine errors
red           = "#ff5f59"
red_faint     = "#ff9580"

# Modeline semantic colours
ml_err        = "#e5bf00"
ml_warning    = "#c0cf35"
ml_info       = "#abeadf"

# ── Prompt character ──────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](bold blue)"
error_symbol   = "[❯](bold yellow_warmer)"
vimcmd_symbol  = "[❮](bold cyan)"

# ── OS / session info ─────────────────────────────────────────────────────────

[os]
disabled = false
style    = "fg_dim"

[os.symbols]
Arch     = " "
Debian   = " "
Fedora   = " "
Macos    = " "
NixOS    = " "
Ubuntu   = " "
Unknown  = " "
Windows  = " "

[username]
show_always = false
style_user  = "blue_warmer bold"
style_root  = "yellow_warmer bold"
format      = "[$user]($style)[@]($style)"

[hostname]
ssh_only  = true
style     = "blue_faint"
format    = "[$ssh_symbol$hostname]($style) "
ssh_symbol= "󰒍 "

# ── Directory ─────────────────────────────────────────────────────────────────

[directory]
style              = "blue bold"
read_only_style    = "yellow_warmer"
repo_root_style    = "cyan bold"
truncate_to_repo   = true
truncation_length  = 3
truncation_symbol  = "…/"
read_only          = " 󰌾"
format             = "[$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"~"          = "~"
"Documents"  = "󰈙 "
"Downloads"  = " "
"Desktop"    = "󰇄 "
"Music"      = "󰝚 "
"Pictures"   = " "
"Videos"     = "󰕧 "
".config"    = " "
"src"        = "󰅩 "

# ── Git ───────────────────────────────────────────────────────────────────────

[git_branch]
style    = "yellow bold"
symbol   = " "
format   = "[$symbol$branch(:$remote_branch)]($style) "

[git_state]
style            = "yellow_warmer bold"
format           = '\([$state( $progress_current/$progress_total)]($style)\) '
rebase           = "REBASE"
merge            = "MERGE"
revert           = "REVERT"
cherry_pick      = "CHERRY"
bisect           = "BISECT"
am               = "AM"
am_or_rebase     = "AM/REBASE"

[git_status]
style     = "yellow_cooler"
format    = '([\[$all_status$ahead_behind\]]($style) )'
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date= ""
untracked = "?${count}"
stashed   = "*${count}"
modified  = "!${count}"
staged    = "+${count}"
renamed   = "»${count}"
deleted   = "✘${count}"

[git_metrics]
disabled          = false
added_style       = "blue_warmer"
deleted_style     = "yellow_warmer"
format            = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

# ── Fill ──────────────────────────────────────────────────────────────────────

[fill]
symbol = " "
style  = "bg_dim"

# ── Right-side info ───────────────────────────────────────────────────────────

[cmd_duration]
min_time          = 2_000
style             = "yellow_faint"
format            = "[$duration]($style) "
show_milliseconds = false

[jobs]
style  = "cyan_faint"
symbol = "✦"
format = "[$symbol$number]($style) "

[battery]
format = "[$symbol$percentage]($style) "
[[battery.display]]
threshold = 15
style     = "yellow_warmer bold"
discharging_symbol = "󰁺 "
[[battery.display]]
threshold = 50
style     = "yellow"
discharging_symbol = "󰁿 "
[[battery.display]]
threshold = 100
style     = "fg_dim"
discharging_symbol = "󰁹 "

[time]
disabled   = false
style      = "fg_dim"
format     = "[$time]($style) "
time_format= "%H:%M"
use_12hr   = false

# ── Language / tool versions ──────────────────────────────────────────────────

[python]
style   = "yellow bold"
symbol  = " "
format  = '[$symbol${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[nodejs]
style  = "green bold"
symbol = " "
format = "[$symbol($version )]($style)"

[rust]
style  = "yellow_warmer bold"
symbol = " "
format = "[$symbol($version )]($style)"

[golang]
style  = "cyan bold"
symbol = " "
format = "[$symbol($version )]($style)"

[java]
style  = "blue_faint bold"
symbol = " "
format = "[$symbol($version )]($style)"

[kotlin]
style  = "blue bold"
symbol = " "
format = "[$symbol($version )]($style)"

[lua]
style  = "blue_cooler bold"
symbol = " "
format = "[$symbol($version )]($style)"

[ruby]
style  = "red_faint bold"
symbol = " "
format = "[$symbol($version )]($style)"

[php]
style  = "magenta_cooler bold"
symbol = " "
format = "[$symbol($version )]($style)"

[swift]
style  = "yellow_warmer bold"
symbol = " "
format = "[$symbol($version )]($style)"

[docker_context]
style  = "blue_warmer bold"
symbol = " "
format = "[$symbol$context]($style) "

[terraform]
style  = "magenta_faint bold"
symbol = "󱁢 "
format = "[$symbol$workspace]($style) "

[nix_shell]
style       = "blue bold"
symbol      = " "
format      = '[$symbol$state( \($name\))]($style) '
impure_msg  = "impure"
pure_msg    = "pure"

[package]
style  = "yellow_faint"
symbol = "󰏗 "
format = "[$symbol$version]($style) "

# ── Errors / status ───────────────────────────────────────────────────────────
# (All "error" semantics use yellows/blues per deuteranopia design.)

[status]
disabled         = false
style            = "yellow_warmer bold"
not_executable_style = "yellow bold"
not_found_style  = "yellow_faint"
sigint_style     = "cyan_warmer bold"
signal_style     = "cyan bold"
success_style    = "fg_dim"
format           = '[$symbol$status]($style) '
symbol           = "✘"
success_symbol   = ""
not_executable_symbol = "🚫"
not_found_symbol = "󰍉"
sigint_symbol    = "󰚌"
signal_symbol    = "⚡"

[sudo]
disabled = false
style    = "yellow_warmer bold"
symbol   = "󰆥 "
format   = "[$symbol]($style)"

# ── Cloud / infra ─────────────────────────────────────────────────────────────

[aws]
style  = "yellow bold"
symbol = "󰸏 "
format = '[$symbol($profile )(\($region\) )(\[$duration\] )]($style)'

[gcloud]
style  = "blue bold"
symbol = "󱇶 "
format = '[$symbol$account(@$domain )(\($project\) )]($style)'

[kubernetes]
disabled = false
style    = "cyan_cooler bold"
symbol   = "󱃾 "
format   = '[$symbol$context( \($namespace\))]($style) '
