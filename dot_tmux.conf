unbind r
bind r source-file ~/.tmux.conf

# set -g default-terminal "tmux-256color"
# set -ag terminal-overrides ",xterm-256color:RGB"
set -g prefix C-a
set -g mouse on
set -g history-limit 10000
set -g renumber-windows on
set -g set-clipboard on
setw -g mode-keys vi

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key | split-pane -v
bind-key - split-pane -h 
bind-key o new-window -c "#{pane_current_path}"
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send-keys -X copy-line-and-cancel
unbind '"'
unbind %

set-option -g status-position top

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'tmux-plugins/tmux-battery'

# =============================================================================
# Modus Vivendi Deuteranopia — Tmux Theme
# =============================================================================
# Based on the Modus Themes for GNU Emacs by Protesilaos Stavrou
# Source: https://protesilaos.com/emacs/modus-themes
# Variant: modus-vivendi-deuteranopia (dark, optimised for red-green colour
# deficiency — uses yellow/blue instead of red/green for colour coding)
#
# Palette colours (resolved hex values):
#   bg-main            #000000   fg-main            #ffffff
#   bg-dim             #1e1e1e   fg-dim             #989898
#   bg-active          #535353   fg-alt             #c6daff
#   bg-inactive        #303030   border             #646464
#   bg-mode-line-active  #2a2a6a  fg-mode-line-active  #f0f0f0
#   bg-mode-line-inactive #2d2d2d fg-mode-line-inactive #969696
#   border-mode-line-active  #8080a7
#   border-mode-line-inactive #606060
#   bg-tab-bar         #313131   bg-tab-current     #000000
#   bg-tab-other       #545454
#   blue               #2fafff   blue-warmer        #79a8ff
#   blue-cooler        #00bcff   blue-faint         #82b0ec
#   yellow             #cabf00   yellow-warmer      #ffa00f
#   yellow-cooler      #d8af7a   yellow-faint       #d2b580
#   cyan               #00d3d0   cyan-cooler        #6ae4b9
#   magenta            #feacd0   magenta-cooler     #b6a0ff
#   modeline-err       #e5bf00   modeline-warning   #c0cf35
#   modeline-info      #abeadf
# =============================================================================

# ---------------------------------------------------------------------------
# Global options
# ---------------------------------------------------------------------------
set -g status on
set -g status-interval 5
# set -g status-position bottom

# Use 256 colours + true colour where supported
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# ---------------------------------------------------------------------------
# Status bar — overall
# ---------------------------------------------------------------------------
set -g status-style "bg=#313131,fg=#989898"

# ---------------------------------------------------------------------------
# Left segment  →  [session name]
# ---------------------------------------------------------------------------
set -g status-left-length 40
set -g status-left "#[bg=#2a2a6a,fg=#f0f0f0,bold] #S #[bg=#313131,fg=#2a2a6a]"

# ---------------------------------------------------------------------------
# Right segment  →  host • date • time
# ---------------------------------------------------------------------------
set -g status-right-length 80
set -g status-right \
  "#[bg=#313131,fg=#646464]#[bg=#1e1e1e,fg=#989898] %a %d %b #[fg=#646464]│#[fg=#82b0ec] %H:%M #[fg=#646464]│#{battery_color_bg} Batt: #{battery_icon} #{battery_percentage} #{battery_remain} "

# ---------------------------------------------------------------------------
# Window list (tabs)
# ---------------------------------------------------------------------------
# Inactive windows
set -g window-status-format \
  "#[bg=#313131,fg=#646464] #[bg=#303030,fg=#989898] #I:#W#{?window_flags,#{window_flags}, } #[bg=#313131,fg=#303030]"

# Active window  (blue mode-line matches the Emacs deuteranopia mode line)
set -g window-status-current-format \
  "#[bg=#313131,fg=#2a2a6a]#[bg=#2a2a6a,fg=#f0f0f0,bold] #I:#W#{?window_flags,#{window_flags}, } #[bg=#313131,fg=#2a2a6a]"

# Activity/bell in a window → yellow-warmer (deuteranopia accent)
set -g window-status-activity-style "bg=#313131,fg=#ffa00f,bold"
set -g window-status-bell-style     "bg=#313131,fg=#e5bf00,bold,blink"

set -g window-status-separator ""

# ---------------------------------------------------------------------------
# Pane borders
# ---------------------------------------------------------------------------
set -g pane-border-style        "fg=#646464"
set -g pane-active-border-style "fg=#79a8ff"   # blue-warmer

# ---------------------------------------------------------------------------
# Command / message line
# ---------------------------------------------------------------------------
set -g message-style        "bg=#1e1e1e,fg=#cabf00"        # yellow on bg-dim
set -g message-command-style "bg=#1e1e1e,fg=#79a8ff"       # blue-warmer on bg-dim

# ---------------------------------------------------------------------------
# Mode (copy-mode, search) highlight
# ---------------------------------------------------------------------------
set -g mode-style "bg=#2f447f,fg=#f0f0f0"    # bg-completion + fg-main

# ---------------------------------------------------------------------------
# Clock (prefix + t)
# ---------------------------------------------------------------------------
set -g clock-mode-colour "#2fafff"    # blue
set -g clock-mode-style  24

# ---------------------------------------------------------------------------
# Copy mode / selection
# ---------------------------------------------------------------------------
set -g copy-mode-match-style    "bg=#7a6100,fg=#ffffff"    # bg-yellow-intense
set -g copy-mode-current-match-style "bg=#ffa00f,fg=#000000"  # yellow-warmer fg

# ---------------------------------------------------------------------------
# Miscellaneous
# ---------------------------------------------------------------------------
# Display pane numbers with blue-warmer
set -g display-panes-colour        "#82b0ec"   # blue-faint
set -g display-panes-active-colour "#79a8ff"   # blue-warmer

# Popup / overlay border
set -g popup-border-style "fg=#8080a7"    # border-mode-line-active

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
